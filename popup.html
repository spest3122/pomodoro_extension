<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 280px;
            font-family: Arial, sans-serif;
            padding: 15px;
            margin: 0;
            text-align: center;
        }

        .timer-display {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 5px 0;
        }

        #current-task-title {
            font-size: 1.1rem;
            color: #555;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            padding: 6px 12px;
            margin: 2px;
            cursor: pointer;
        }

        .settings {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #ccc;
            text-align: left;
        }

        .task-row {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
            align-items: center;
        }

        .task-row input[type="text"] {
            flex: 2;
            width: 80px;
        }

        .task-row input[type="number"] {
            flex: 1;
            width: 40px;
        }

        .delete-btn {
            color: red;
            cursor: pointer;
            border: none;
            background: none;
            font-weight: bold;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .break-inputs input {
            width: 50px;
        }
    </style>
</head>

<body>
    <h3>Pomodoro Timer</h3>
    <div id="current-task-title">Loading...</div>
    <div class="timer-display" id="time-left">25:00</div>

    <div>
        <button class="btn" id="start-btn">Start</button>
        <button class="btn" id="pause-btn">Pause</button>
        <button class="btn" id="reset-btn">Reset</button>
    </div>

    <div class="settings">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h4>Custom Work Tasks</h4>
            <button class="btn" id="add-task-btn" style="font-size: 0.8rem; padding: 2px 6px;">+ Add (Max 3)</button>
        </div>

        <div id="tasks-container"></div>

        <div class="break-inputs">
            <h4>Breaks</h4>
            <label>Short Break (Mins): <input type="number" id="short-time" value="5" min="1"></label>
            <label>Long Break (Mins): <input type="number" id="long-time" value="15" min="1"></label>
            <label>Long Break After: <input type="number" id="cycle-target" value="4" min="1"> sessions</label>
        </div>

        <button class="btn" id="save-settings" style="margin-top: 12px; width: 100%;">Save & Reset</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
