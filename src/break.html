<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f6f9;
            color: #333;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 30px;
        }

        /* Container for dynamic task selection buttons */
        .buttons-flex {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 32px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .btn:hover {
            transform: scale(1.03);
        }
    </style>
</head>

<body>
    <h1 id="greeting">Session Complete!</h1>
    <p id="message">What would you like to do next?</p>
    <p id="tomatoes-left" style="margin-top: -15px; margin-bottom: 25px; font-size: 1.2rem; color: #e74c3c; font-weight: bold; display: none;"></p>

    <div class="buttons-flex" id="action-buttons-container"></div>

    <script src="break.js"></script>
</body>

</html>
