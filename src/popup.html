<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 250px;
        font-family: Arial, sans-serif;
        padding: 15px;
        margin: 0;
        text-align: center;
      }
      .timer-display {
        font-size: 2.5rem;
        font-weight: bold;
        margin: 5px 0;
      }
      #current-task-title {
        font-size: 1.1rem;
        color: #555;
        font-weight: bold;
        margin-bottom: 10px;
      }

      /* ── Task buttons ── */
      #task-btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        margin-bottom: 8px;
      }
      .task-btn {
        flex: 1 1 auto;
        padding: 7px 10px;
        font-size: 0.82rem;
        font-weight: bold;
        cursor: pointer;
        border: 2px solid var(--task-color);
        background: #fff;
        color: var(--task-color);
        border-radius: 6px;
        transition: background 0.15s, color 0.15s, opacity 0.15s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .task-btn.active {
        background: var(--task-color);
        color: #fff;
      }
      .task-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      /* Per-task color palette */
      .task-btn-0 { --task-color: #e74c3c; } /* tomato red */
      .task-btn-1 { --task-color: #6366f1; } /* indigo     */
      .task-btn-2 { --task-color: #f59e0b; } /* amber      */

      /* ── Break buttons ── */
      #break-btn-row {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin-bottom: 8px;
      }
      .break-btn {
        flex: 1;
        padding: 6px 8px;
        font-size: 0.8rem;
        font-weight: bold;
        cursor: pointer;
        border: 2px solid var(--break-color);
        background: #fff;
        color: var(--break-color);
        border-radius: 6px;
        transition: background 0.15s, color 0.15s, opacity 0.15s;
      }
      .break-btn.active {
        background: var(--break-color);
        color: #fff;
      }
      .break-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      #short-break-btn { --break-color: #0ea5e9; } /* sky blue  */
      #long-break-btn  { --break-color: #10b981; } /* emerald   */

      /* ── Pause / Reset row ── */
      .controls-row {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin-top: 4px;
      }
      .btn {
        flex: 1;
        padding: 7px 0;
        cursor: pointer;
        font-size: 0.85rem;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #f5f5f5;
      }
      .btn:hover {
        background: #e8e8e8;
      }

      .footer-links {
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px solid #ccc;
      }
      .settings-link {
        font-size: 0.85rem;
        color: #007bff;
        text-decoration: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h3>Pomodoro Timer</h3>
    <div id="current-task-title">Loading...</div>
    <div class="timer-display" id="time-left">25:00</div>

    <!-- One button per custom task -->
    <div id="task-btn-row"></div>

    <!-- Short Break / Long Break -->
    <div id="break-btn-row">
      <button class="break-btn" id="short-break-btn">☕ Short Break</button>
      <button class="break-btn" id="long-break-btn">🛋️ Long Break</button>
    </div>

    <!-- Pause + Reset -->
    <div class="controls-row">
      <button class="btn" id="pause-btn">⏸ Pause</button>
      <button class="btn" id="reset-btn">↺ Reset</button>
    </div>

    <div class="footer-links">
      <span class="settings-link" id="open-settings">⚙️ Open Settings Board</span>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
