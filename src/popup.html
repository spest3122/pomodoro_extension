<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 250px;
        font-family: Arial, sans-serif;
        padding: 15px;
        margin: 0;
        text-align: center;
      }
      .timer-display {
        font-size: 2.5rem;
        font-weight: bold;
        margin: 5px 0;
      }
      #current-task-title {
        font-size: 1.1rem;
        color: #555;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .btn {
        padding: 6px 12px;
        margin: 2px;
        cursor: pointer;
      }
      .footer-links {
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px solid #ccc;
      }
      .settings-link {
        font-size: 0.85rem;
        color: #007bff;
        text-decoration: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h3>Pomodoro Timer</h3>
    <div id="current-task-title">Loading...</div>
    <div class="timer-display" id="time-left">25:00</div>

    <div>
      <button class="btn" id="start-btn">Start</button>
      <button class="btn" id="pause-btn">Pause</button>
      <button class="btn" id="reset-btn">Reset</button>
    </div>

    <div class="footer-links">
      <span class="settings-link" id="open-settings"
        >⚙️ Open Settings Board</span
      >
    </div>

    <script src="popup.js"></script>
  </body>
</html>
